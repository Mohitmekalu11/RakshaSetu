<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrimeCast | News Intelligence</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        #intel-feed {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        .intel-card {
            background: #ffffff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .intel-card:hover {
            transform: translateY(-3px);
        }
        .risk-high {
            border-left: 5px solid #e53935;
        }
        .risk-medium {
            border-left: 5px solid #fbc02d;
        }
        .risk-low {
            border-left: 5px solid #43a047;
        }
        .intel-card h3 {
            margin: 0 0 8px 0;
            font-size: 18px;
        }
        .intel-card p {
            margin: 4px 0;
            font-size: 14px;
        }
        .label {
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>CrimeCast News Intelligence</h1>

<div id="intel-feed">
    <!-- Dynamic cards will be appended here -->
</div>

<script>
async function loadIntel() {
    try {
        const res = await fetch("/api/intelligence/");  // Adjust if your URL differs
        const json = await res.json();

        const container = document.getElementById("intel-feed");
        container.innerHTML = "";

        json.data.forEach(item => {
            const card = document.createElement("div");
            card.className = `intel-card risk-${item.risk_level.toLowerCase()}`;

            card.innerHTML = `
                <h3>${item.headline}</h3>
                <p><span class="label">Crime:</span> ${item.crime_type}</p>
                <p><span class="label">City:</span> ${item.city}${item.area ? ', ' + item.area : ''}</p>
                <p><span class="label">Published:</span> ${item.published_at}</p>
                <p><span class="label">Risk:</span> ${item.risk_level} (${item.deviation_pct}% deviation)</p>
                <p><span class="label">Historical Avg:</span> ${item.historical_avg.toFixed(1)}</p>
                <p><span class="label">Recent Trend:</span> ${item.recent_trend}</p>
                <p><span class="label">Predicted Risk:</span> ${item.predicted_risk}</p>
                <p><span class="label">Action:</span> ${item.recommended_action}</p>
            `;

            container.appendChild(card);
        });
    } catch (err) {
        console.error("Error loading intelligence feed:", err);
    }
}

// Initial load
loadIntel();

// Optional: refresh every 5 minutes
// setInterval(loadIntel, 300000);
</script>

</body>
</html>
