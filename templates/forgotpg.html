<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    {% load static %}
    <script src="https://unpkg.com/ionicons@latest/dist/ionicons/ionicons.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Trebuchet MS", "Lucida Sans Unicode", "Lucida Grande", "Lucida Sans", Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #background-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .form-box {
            width: 450px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
            color: white;
            padding: 20px;
            border-radius: 10px;
        }
        
        .card{
            margin: 0 auto;
            padding: 2em;
            width: 300px;
            background: #1c1f2b;
            text-align: center;
            border-radius: 10px;
            position: relative;
        }
        .card::after{
            
            content: '';
            
            position: absolute;
            
            height: 100%;
            
            width: 100%;
            
            background-image: conic-gradient(#ff2400,#006aff,#);
            
            top: 50%;
            
            left: 50%;
            translate: -50% -50%;
            
            z-index: -1;
            
            padding: 3px;
            border-radius: 10px;
        }
        .popup-message {
            display: none;
            position: fixed;
            left: 50%;
            top: 20px;
            transform: translateX(-50%);
            background-color: #fff;
            color: black;
            font-weight: 500;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            z-index: 1000;
            overflow: hidden;
            animation: moveFromTop 0.5s ease forwards;
        }

        @keyframes moveFromTop {
            0% {
                top: -100px;
                opacity: 0;
            }

            100% {
                top: 20px;
                opacity: 1;
            }
        }

        .popup-message::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 5px;
            background: red;
            animation: anim 4s linear forwards;
        }

        @keyframes anim {
            100% {
                width: 0;
            }
        }

        .popup-message ion-icon {
            color: red;
            vertical-align: middle;
            margin-right: 8px;
            font-size: 1.5em;
        }

        .form-box h2 {
            font-size: 38px;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-box .input-box {
            position: relative;
            width: 98%;
            height: 50px;
            margin: 15px 0;
            border-radius: 25px;
            display: flex;
            align-items: center;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.4);
            padding: 0 20px;
        }

        .input-box .icon {
            font-size: 20px;
            color: white;
            margin-right: 10px;
        }

        .input-box input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-size: 16px;
            color: white;
            padding: 10px;
        }

        .input-box input::placeholder {
            color: rgba(255, 255, 255, 0.8);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .remember-forgot label {
            display: flex;
            align-items: center;
            color: white;
        }

        .remember-forgot input[type="checkbox"] {
            accent-color: white;
            margin-right: 10px;
        }

        .remember-forgot a {
            color: white;
            text-decoration: none;
        }

        .remember-forgot a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            height: 45px;
            background: white;
            border: none;
            border-radius: 40px;
            color: #02519f;
            font-size: 16px;
            cursor: pointer;
            transition: 0.4s ease, color 0.3s ease;
        }

        .btn:hover {
            background: #35b6d2;
            color: white;
        }

        .register {
            text-align: center;
            padding: 20px;
        }

        .register a {
            color: #f0f0f0;
            font-weight: 600;
            text-decoration: none;
        }

        .register a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <!-- Background video -->
    <video autoplay muted loop id="background-video">
        <source src="{% static 'lg.mp4' %}" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <!-- Popup message for errors or success -->
    <div id="popup-message" class="popup-message"></div>

    <!-- Form Box -->
    <div class="form-box">
        <form method="POST" action="">
            {% csrf_token %}
            <h2>Forgot password</h2>
            <div class="input-box">
                <span class="icon">
                    <ion-icon name="person-outline"></ion-icon>
                </span>
                <input type="text" placeholder="Enter your username" name="username" required>
            </div>

            <button type="submit" class="btn">Submit</button>
        </form>
    </div>

    <script>
        document.querySelectorAll('.toggle-password').forEach(item => {
            item.addEventListener('click', function () {
                const passwordField = this.nextElementSibling;
                const eyeIcon = this.querySelector('ion-icon');
                if (passwordField.type === 'password') {
                    passwordField.type = 'text';
                    eyeIcon.setAttribute('name', 'eye-off-outline');
                } else {
                    passwordField.type = 'password';
                    eyeIcon.setAttribute('name', 'eye-outline');
                }
            });
        });

        const messages = [];

        {% for message in messages %}
        messages.push({
            level: "{{ message.level_tag }}",
            message: "{{ message }}",
            tags: "{{ message.tags }}"
        });
        {% endfor %}

        if (messages.length > 0) {
            const popupMessage = document.getElementById('popup-message');

            messages.forEach(function (message) {
                if (message.tags === 'error') {
                    popupMessage.style.backgroundColor = '#fff';
                    popupMessage.innerHTML = `<ion-icon name="alert-circle-outline"></ion-icon>  ${message.message}`;

                    popupMessage.style.display = 'block';
                    setTimeout(function () {
                        popupMessage.style.display = 'none';
                    }, 5000);
                }
            });
        }
    </script>
</body>

</html>
