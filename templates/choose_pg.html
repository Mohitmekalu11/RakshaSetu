<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/ionicons@latest/dist/ionicons/ionicons.js"></script>

    <title>CrimeCast</title>
    <link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RakshaSetu">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/static/sw.js')
        .then(reg => console.log('SW registered'))
        .catch(err => console.log('SW failed:', err));
    });
  }
</script>
    {% load static %}
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Trebuchet MS", "Lucida Sans Unicode", "Lucida Grande", "Lucida Sans", Arial, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: url("{% static 'img1.png' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            text-align: center;
        }
        /* Popup Message Styles */
        .popup-message {
            display: none; /* Initially hidden */
            position: fixed;
            left: 11s5px;
            top: 20px;
            transform: translateX(-50%);
            background-color: #fff;
            color: black;
            font-weight: 500;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            z-index: 1000;
            overflow: hidden;
            animation: moveFromTop 0.5s ease forwards;
        }

        @keyframes moveFromTop {
            0% {
                top: -100px; /* Start above the screen */
                opacity: 0;
            }
            100% {
                top: 20px; /* Final position */
                opacity: 1;
            }
        }

        .popup-message::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 5px;
            background: green;
            animation: anim 4s linear forwards;
        }

        @keyframes anim {
            100% {
                width: 0;
            }
        }

        /* Header Styles */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 50px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        .SKILLSPHERE_LOGO {
            width: 450px; 
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.7));
            margin-bottom: 40px;
        }

        header p {
            font-size: 28px;
            font-style: italic;
            position: absolute;
            bottom: -20px;
            right: -10px;  
        }

        /* Button Container Styles */
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            z-index: 1; /* Ensure it's above background */
        }

        .button-container button {
            width: 270px;
            height: 120px;
            text-transform: capitalize;
            background: linear-gradient(135deg, #6dd5fa, #0c9aba);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .button-container button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            transition: height 0.3s ease;
        }

        .button-container button:hover,
        .button-container button:focus,
        .button-container button:active {
            background: linear-gradient(135deg, #35b6d2, #6dd5fa);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
            transform: scale(1.05);
        }

        /* Footer Styles */
        footer {
            margin-top: 50px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
        }

        footer p {
            font-size: 18px;
        }

        /* Popup Icon Styling */
        .popup-message ion-icon {
            color: green; /* Set icon color to green */
            vertical-align: middle; /* Align the icon vertically with the text */
            margin-right: 8px; /* Add some space between the icon and the message */
            font-size: 1.5em; /* Increase the icon size if needed */
        }
        header p {
            font-size: 24px; /* Adjust font size */
            font-style: italic;
            font-weight: bold; /* Optionally make it bold */
            position: absolute;
            bottom: -30px;  /* Adjust to control the space between the logo and text */
            right: 10px;  /* Adjust to move it slightly to the right */
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7); /* Keep the shadow for better visibility */
            line-height: 1.4; /* Adjust line height for better spacing */
        }
        
    </style>
</head>
<body>
    <!-- Popup Message Element -->
    <div class="popup-message" id="popup-message"></div>

    <!-- Header with Logo -->
    <header class="logo">
        <img src="{% static 'logo_rs.png' %}" alt="SKILLSPHERE_LOGO" class="SKILLSPHERE_LOGO">
        <p >~ Predicting crime, ensuring safety. </p>
    </header>

    <!-- Form to submit the role -->
    <form method="POST">
        {% csrf_token %}
        <div class="button-container">
            <!-- When clicked, set role as 'Citizen' -->
            <button type="submit" name="role" value="citizen">Join as a Citizen!</button>
            <!-- When clicked, set role as 'police' -->
            <button type="submit" name="role" value="police">Join as a Police Officer!</button>
            <button type="submit" name="role" value="sho">Join as a SHO!</button>
        </div>
    </form>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2025 CRIMECAST. All rights reserved.</p>
    </footer>

    <!-- JavaScript to Handle Popup Message -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const successMessage = "{{ success_message }}";

            if (successMessage) {
                const popupMessage = document.querySelector('.popup-message');
                popupMessage.innerHTML = `<ion-icon name="checkmark-circle"></ion-icon> ${successMessage}`;
                popupMessage.style.display = 'block';

                // Hide the popup after 5 seconds
                setTimeout(function () {
                    popupMessage.style.display = 'none';
                }, 5000);
            }
        });
    </script>
</body>
</html>
