{%  extends "base(hire).html" %}
{% load static %}
{% block content %}

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("{% static 'img1.png' %}") no-repeat center center fixed;
            background-size: cover;
            color: white;
            padding-top: 50px
        }

        .contact {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        .contact h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-field input, .textareafield textarea {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
        }

        .input-field input::placeholder, .textareafield textarea::placeholder {
            color: #ccc;
        }

        .input-field input:focus, .textareafield textarea:focus {
            outline: none;
            background-color: rgba(255, 255, 255, 0.2);
            border: 1px solid #007BFF;
        }

        .textareafield textarea {
            resize: none;
            height: 150px;
        }

        button {
            padding: 15px;
            background-color: #007BFF;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <section class="contact">
        <h2>Contact Us!</h2>
        <form id="contactForm" method="POST" action="{% url 'send_email' %}">
            {% csrf_token %}
            <div class="input-box">
                <div class="input-field">
                    <input type="text" name="subject" placeholder="Subject" class="item" autocomplete="off">
                </div>
                <div class="textareafield field">
                    <textarea name="message" cols="30" rows="10" placeholder="Your Message" class="item"></textarea>
                </div>
                <div class="input-field">
                    <input type="email" name="email" placeholder="Your Email Address" class="item" autocomplete="off">
                </div>
                <button type="submit" id="submit">Send Message</button>
            </div>
        </form>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Handle the form submission
        document.getElementById('contactForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent default form submission
            
            // Basic form validation
            const subject = document.querySelector('input[name="subject"]').value;
            const message = document.querySelector('textarea[name="message"]').value;
            const email = document.querySelector('input[name="email"]').value;
    
            if (!subject || !message || !email) {
                Swal.fire({
                    title: 'Error!',
                    text: 'Please fill out all fields.',
                    icon: 'error',
                    confirmButtonText: 'OK'
                });
                return; // Stop form submission if validation fails
            }
    
            const formData = new FormData(this); // Get form data
    
            // Send the form data using fetch
            fetch("{% url 'send_email' %}", {
                method: "POST",
                body: formData,
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}' // Include CSRF token
                }
            })
            .then(response => {
                console.log('Response:', response); // Log the response object
                return response.json().then(data => {
                    return { response, data }; // Return both response and data
                });
            })
            .then(({ response, data }) => {
                console.log('Data:', data); // Log the data received
                if (response.ok) {
                    Swal.fire({
                        title: 'Message Sent!',
                        text: data.message || 'Your message has been successfully sent.',
                        icon: 'success',
                        confirmButtonText: 'OK'
                    });
                    // Reset form
                    document.getElementById('contactForm').reset();
                } else {
                    Swal.fire({
                        title: 'Error!',
                        text: data.message || 'There was an issue sending your message. Please try again later.',
                        icon: 'error',
                        confirmButtonText: 'OK'
                    });
                }
            })
            .catch(error => {
                console.error('Fetch error:', error); // Log any fetch errors
                Swal.fire({
                    title: 'Error!',
                    text: 'An unexpected error occurred. Please try again later.',
                    icon: 'error',
                    confirmButtonText: 'OK'
                });
            });
        });
    </script>
    
    
    {% endblock content %}
