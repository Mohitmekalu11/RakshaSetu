{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>officers notification</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>

:root{
  --bg:#07090f;--bg2:#0d1017;--bg3:#111520;--wire:#1a1f2e;--wire2:#232940;
  --accent:#3b82f6;--ok:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --text:#e2e8f8;--text2:#8891aa;--text3:#4a5068;
  --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
}

/* BELL */
#alertBell{
  position:fixed;bottom:24px;right:24px;z-index:1000;
  width:52px;height:52px;border-radius:50%;border:none;
  background:var(--danger);color:#fff;font-size:1.4rem;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(239,68,68,.55);
  animation:bellPulse 2s ease infinite;
}
@keyframes bellPulse{0%,100%{box-shadow:0 4px 20px rgba(239,68,68,.55)}50%{box-shadow:0 6px 32px rgba(239,68,68,.9)}}
.bell-count{
  position:absolute;top:-4px;right:-4px;
  background:#fff;color:var(--danger);
  border-radius:99px;font-family:var(--mono);font-size:.6rem;
  font-weight:700;padding:1px 6px;min-width:18px;text-align:center;
}

/* POPUP */
#incidentPopup{
  position:fixed;bottom:24px;right:24px;z-index:999;
  width:360px;background:var(--bg2);border:1px solid var(--wire2);
  border-radius:16px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
  transform:translateY(20px) scale(.97);opacity:0;
  transition:transform .3s ease,opacity .3s ease;
  pointer-events:none;
}
#incidentPopup.visible{transform:translateY(0) scale(1);opacity:1;pointer-events:all;}
#incidentPopup.shake{animation:shake .5s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

/* SEVERITY STRIP */
.popup-strip{height:4px;width:100%}
.strip-low     {background:var(--ok)}
.strip-medium  {background:var(--warn)}
.strip-high    {background:var(--danger)}
.strip-critical{background:var(--danger);animation:stripFlash .6s ease infinite alternate}
@keyframes stripFlash{from{opacity:1}to{opacity:.4}}

/* POPUP INNER */
.popup-inner{padding:16px}

.popup-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.popup-badge{display:flex;align-items:center;gap:10px}
.popup-badge-icon{font-size:1.5rem;flex-shrink:0}
.popup-badge-title{display:block;font-size:.88rem;font-weight:700;color:var(--text);line-height:1.3}
.popup-badge-sub{display:block;font-family:var(--mono);font-size:.58rem;color:var(--text3);margin-top:2px}
.popup-close{background:transparent;border:none;color:var(--text3);font-size:1rem;cursor:pointer;padding:2px 6px;border-radius:4px;transition:color .15s}
.popup-close:hover{color:var(--text)}

/* CHIPS */
.popup-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.pchip{padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:.56rem;letter-spacing:.08em;text-transform:uppercase;border:1px solid}
.pchip-sev-low    {border-color:rgba(16,185,129,.35);color:var(--ok);background:rgba(16,185,129,.08)}
.pchip-sev-medium {border-color:rgba(245,158,11,.35);color:var(--warn);background:rgba(245,158,11,.08)}
.pchip-sev-high   {border-color:rgba(239,68,68,.35);color:var(--danger);background:rgba(239,68,68,.08)}
.pchip-sev-critical{border-color:rgba(239,68,68,.5);color:var(--danger);background:rgba(239,68,68,.15)}
.pchip-type{border-color:rgba(59,130,246,.35);color:var(--accent);background:rgba(59,130,246,.08)}
.pchip-esc {border-color:rgba(245,158,11,.35);color:var(--warn);background:rgba(245,158,11,.08)}

.popup-summary{font-size:.82rem;color:var(--text2);line-height:1.55;margin-bottom:12px}

/* ESCALATION BAR */
.esc-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.esc-label{font-family:var(--mono);font-size:.58rem;color:var(--text3);width:60px;flex-shrink:0}
.esc-track{flex:1;height:4px;background:var(--wire2);border-radius:99px;overflow:hidden}
.esc-fill{height:100%;border-radius:99px;width:0%;transition:width 1s ease}
.esc-pct{font-family:var(--mono);font-size:.65rem;width:32px;text-align:right;flex-shrink:0}

/* MAP */
#alertMap{height:150px;border-radius:8px;overflow:hidden;margin-bottom:10px}

/* LOCATION ROW */
.loc-row{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:.62rem;color:var(--text3);margin-bottom:10px;line-height:1.4}
.loc-row a{color:var(--accent);text-decoration:none;margin-left:auto;flex-shrink:0}
.loc-row a:hover{text-decoration:underline}

/* TIMER */
.timer-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-family:var(--mono);font-size:.6rem}
.timer-label{color:var(--text3)}
.timer-count{color:var(--warn)}
.timer-track{height:3px;background:var(--wire2);border-radius:99px;overflow:hidden;margin-bottom:12px}
.timer-fill{height:100%;border-radius:99px;background:var(--warn);width:100%;transition:width 1s linear,background .5s}

/* ACTIONS */
.popup-actions{display:flex;gap:8px}
.btn-accept{flex:1;padding:11px;border:none;border-radius:8px;background:var(--ok);color:#fff;font-family:var(--font);font-size:.85rem;font-weight:700;cursor:pointer;transition:all .18s}
.btn-accept:hover{background:#0ea572;box-shadow:0 4px 14px rgba(16,185,129,.3)}
.btn-reject{flex:0 0 80px;padding:11px;border-radius:8px;border:1px solid var(--wire2);background:transparent;color:var(--text2);font-family:var(--mono);font-size:.72rem;cursor:pointer;transition:all .18s}
.btn-reject:hover{border-color:var(--danger);color:var(--danger)}

/* ACCEPTED STATE */
.accepted-state{text-align:center;padding:20px 0}
.accepted-icon{font-size:2.5rem;margin-bottom:10px}
.accepted-title{font-size:1rem;font-weight:700;color:var(--ok);margin-bottom:6px}
.accepted-sub{font-family:var(--mono);font-size:.65rem;color:var(--text3);margin-bottom:16px}
.navigate-btn{display:inline-block;padding:10px 24px;border-radius:8px;background:var(--accent);color:#fff;text-decoration:none;font-family:var(--mono);font-size:.72rem;transition:all .18s}
.navigate-btn:hover{background:#2563eb}
</style>
</head>

<body> 
<!-- BELL (shown when popup is hidden) -->
<button id="alertBell" onclick="showPopup()" title="View incident alert">
  🔔
  <span class="bell-count" id="bellCount">1</span>
</button>

<!-- MAIN POPUP -->
<div id="incidentPopup">
  <div class="popup-strip" id="popupStrip"></div>
  <div class="popup-inner" id="popupInner">
    <div style="text-align:center;padding:28px 0;font-family:var(--mono);font-size:.65rem;color:var(--text3)">
      Waiting for incident alerts...
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
(function(){
  let currentAlertId = null;
  let timerInterval  = null;
  let alertMap       = null;
  let seenAlertIds   = new Set(JSON.parse(sessionStorage.getItem('seenAlerts')||'[]'));

  function getCSRF(){
    const c=document.cookie.split('; ').find(r=>r.startsWith('csrftoken='));
    return c?decodeURIComponent(c.split('=')[1]):'';
  }

  function sevIcon(s){return{low:'🟡',medium:'🟠',high:'🔴',critical:'🆘'}[s]||'🔴';}
  function escColor(p){if(p>=70)return'#ef4444';if(p>=40)return'#f59e0b';return'#10b981';}

  function playAlert(severity){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const freq=severity==='critical'?880:severity==='high'?660:440;
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=freq;osc.type='sine';
      gain.gain.setValueAtTime(.4,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+.5);
      if(severity==='critical'){
        setTimeout(()=>{
          const o2=ctx.createOscillator(), g2=ctx.createGain();
          o2.connect(g2);g2.connect(ctx.destination);
          o2.frequency.value=1100;o2.type='sine';
          g2.gain.setValueAtTime(.4,ctx.currentTime);
          g2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);
          o2.start(ctx.currentTime);o2.stop(ctx.currentTime+.4);
        },300);
      }
    }catch(e){}
  }

  function renderAlert(alert){
    currentAlertId=alert.id;
    const strip=document.getElementById('popupStrip');
    strip.className=`popup-strip strip-${alert.severity}`;
    const escP=alert.escalation_probability||0;
    const escCol=escColor(escP);
    const locLine=[alert.ward, alert.landmark?`near ${alert.landmark}`:null].filter(Boolean).join(' · ')||'Location unavailable';

    document.getElementById('popupInner').innerHTML=`
      <div class="popup-header">
        <div class="popup-badge">
          <span class="popup-badge-icon">${sevIcon(alert.severity)}</span>
          <div class="popup-badge-text">
            <span class="popup-badge-title">${alert.severity.toUpperCase()} — ${(alert.crime_type||'INCIDENT').toUpperCase()}</span>
            <span class="popup-badge-sub">Reported ${alert.created_at} · ${alert.seconds_ago}s ago</span>
          </div>
        </div>
        <button class="popup-close" onclick="dismissPopup()">✕</button>
      </div>

      <div class="popup-chips">
        <span class="pchip pchip-sev-${alert.severity}">${alert.severity}</span>
        <span class="pchip pchip-type">${alert.crime_type||'unknown'}</span>
        ${escP>0?`<span class="pchip pchip-esc">ESC ${escP}%</span>`:''}
        <span class="pchip pchip-type" style="border-color:rgba(139,92,246,.4);color:#a78bfa;background:rgba(139,92,246,.08)">Risk ${alert.area_risk_score}/10</span>
      </div>

      <div class="popup-summary">${alert.summary||alert.incident_text}</div>

      <div class="esc-row">
        <span class="esc-label">Escalation</span>
        <div class="esc-track"><div class="esc-fill" id="escFill" style="background:${escCol};width:0%"></div></div>
        <span class="esc-pct" style="color:${escCol}">${escP}%</span>
      </div>

      ${alert.latitude?`<div id="alertMap"></div>`:''}

      <div class="loc-row">
        📍 <span>${locLine}</span>
        ${alert.maps_url?`<a href="${alert.maps_url}" target="_blank" rel="noopener">Maps ↗</a>`:''}
      </div>

      <div class="timer-row">
        <span class="timer-label">Auto-expires in</span>
        <span class="timer-count" id="timerCount">5:00</span>
      </div>
      <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>

      <div class="popup-actions" id="popupActions">
        <button class="btn-accept" onclick="respondToAlert(${alert.id},'accept')">✅ Accept</button>
        <button class="btn-reject" onclick="respondToAlert(${alert.id},'reject')">✗ Reject</button>
      </div>
    `;

    setTimeout(()=>{const f=document.getElementById('escFill');if(f)f.style.width=escP+'%';},200);
    if(alert.latitude) setTimeout(()=>renderAlertMap(alert),100);
    startTimer();
  }

  function renderAlertMap(alert){
    if(alertMap){alertMap.remove();alertMap=null;}
    alertMap=L.map('alertMap',{zoomControl:false,attributionControl:false})
      .setView([alert.latitude,alert.longitude],15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(alertMap);
    L.marker([alert.latitude,alert.longitude],{icon:L.divIcon({
      html:'<div style="width:14px;height:14px;border-radius:50%;background:#ef4444;border:3px solid #fff;box-shadow:0 0 16px rgba(239,68,68,.9)"></div>',
      iconSize:[14,14],iconAnchor:[7,7],className:''
    })}).addTo(alertMap).bindPopup(`<b>${alert.crime_type}</b><br>${alert.ward||''}`).openPopup();
  }

  function startTimer(){
    clearInterval(timerInterval);
    let secs=300;
    timerInterval=setInterval(()=>{
      secs--;
      const m=Math.floor(secs/60), s=secs%60;
      const tc=document.getElementById('timerCount');
      const tf=document.getElementById('timerFill');
      if(tc) tc.textContent=`${m}:${String(s).padStart(2,'0')}`;
      if(tf){
        tf.style.width=(secs/300*100)+'%';
        if(secs<60) tf.style.background='#ef4444';
      }
      if(secs<=0){clearInterval(timerInterval);dismissPopup();}
    },1000);
  }

  async function respondToAlert(alertId, action){
    clearInterval(timerInterval);
    const actionsEl=document.getElementById('popupActions');
    if(actionsEl) actionsEl.innerHTML='<div style="text-align:center;color:var(--text3);font-family:\'JetBrains Mono\',monospace;font-size:.72rem;padding:10px">Processing...</div>';

    try{
      const res=await fetch('/api/incident/acknowledge/',{
        method:'POST',
        headers:{'Content-Type':'application/json','X-CSRFToken':getCSRF()},
        credentials:'same-origin',
        body:JSON.stringify({alert_id:alertId,action}),
      });
      const data=await res.json();

      if(action==='accept'){
        document.getElementById('popupInner').innerHTML=`
          <div class="popup-header">
            <div class="popup-badge">
              <span class="popup-badge-icon">✅</span>
              <div class="popup-badge-text">
                <span class="popup-badge-title">Incident Accepted</span>
                <span class="popup-badge-sub">You are assigned · Citizen notified</span>
              </div>
            </div>
          </div>
          <div class="accepted-state">
            <div class="accepted-icon">🚔</div>
            <div class="accepted-title">Respond Immediately</div>
            <div class="accepted-sub">Citizen has been notified you are on the way</div>
            ${data.maps_url?`<a class="navigate-btn" href="${data.maps_url}" target="_blank">📍 Navigate to Incident</a>`:''}
          </div>
        `;
        setTimeout(dismissPopup,8000);
      }else{
        const msg=data.reassigned?'Reassigned to next available officer.':'Alert escalated to SHO.';
        document.getElementById('popupInner').innerHTML=`
          <div style="text-align:center;padding:24px 0;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--text3)">
            ✗ Alert rejected.<br>
            <span style="color:var(--accent);margin-top:6px;display:block">${msg}</span>
          </div>
        `;
        setTimeout(dismissPopup,3000);
      }

      seenAlertIds.add(alertId);
      sessionStorage.setItem('seenAlerts',JSON.stringify([...seenAlertIds]));

    }catch(e){
      if(actionsEl) actionsEl.innerHTML='<div style="color:#ef4444;font-family:\'JetBrains Mono\',monospace;font-size:.72rem;text-align:center;padding:10px">Network error. Try again.</div>';
    }
  }

  function showPopup(){
    document.getElementById('incidentPopup').classList.add('visible');
    document.getElementById('alertBell').style.display='none';
  }

  function dismissPopup(){
    clearInterval(timerInterval);
    document.getElementById('incidentPopup').classList.remove('visible');
    currentAlertId=null;
    setTimeout(()=>{if(alertMap){alertMap.remove();alertMap=null;}},500);
    document.getElementById('alertBell').style.display='none';
  }

  window.showPopup    = showPopup;
  window.dismissPopup = dismissPopup;
  window.respondToAlert = respondToAlert;
  window.renderAlert = renderAlert;

  async function pollAlerts(){
    try{
      const res=await fetch('/api/incident/pending/',{credentials:'same-origin'});
      if(!res.ok)return;
      const data=await res.json();
      const alerts=data.alerts||[];

      const newAlert=alerts.find(a=>a.status==='pending'&&!seenAlertIds.has(a.id));
      if(newAlert&&currentAlertId!==newAlert.id){
        currentAlertId=newAlert.id;
        renderAlert(newAlert);
        showPopup();
        playAlert(newAlert.severity);
        if(newAlert.severity==='critical'){
          document.getElementById('incidentPopup').classList.add('shake');
          setTimeout(()=>document.getElementById('incidentPopup').classList.remove('shake'),600);
        }
        if(document.hidden){
          const bell=document.getElementById('alertBell');
          bell.style.display='flex';
          document.getElementById('bellCount').textContent='1';
        }
      }

      const pending=alerts.filter(a=>a.status==='pending').length;
      const popup=document.getElementById('incidentPopup');
      if(pending>0&&!popup.classList.contains('visible')){
        const bell=document.getElementById('alertBell');
        bell.style.display='flex';
        document.getElementById('bellCount').textContent=pending;
      }else if(pending===0){
        document.getElementById('alertBell').style.display='none';
      }
    }catch(e){}
  }

  setTimeout(()=>{pollAlerts();setInterval(pollAlerts,15000);},2000);
})();
</script>
</body>
</html>
