
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Officer Dashboard — CrimeCast</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
/* ════════════════════════════════════════════════════════════
   OFFICER DASHBOARD — LIGHT THEME PREMIUM REDESIGN
   Palette: warm white base, coral-amber accents, crisp cards
   Font: Outfit (human, readable) + JetBrains Mono (data/labels)
   All HTML & JS untouched — only this <style> block replaced
════════════════════════════════════════════════════════════ */

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0 }

:root {
  /* ── Base surfaces ── */
  --bg:rgb(175, 211, 255);
  --bg2:      #ffffff;
  --bg3:      #f0f2f8;
  --surface:  #ffffff;
  --lift:     #eef1f8;

  /* ── Borders ── */
  --wire:     rgba(15,23,42,.07);
  --wire2:    rgba(15,23,42,.13);

  /* ── Brand / accent ── */
  --accent:   #e05c2a;
  --accent2:  #f97316;
  --accent-dim:rgba(224,92,42,.08);
  --accent-glow:rgba(224,92,42,.22);

  /* ── Semantic ── */
  --ok:       #16a34a;
  --ok-dim:   rgba(22,163,74,.1);
  --warn:     #d97706;
  --warn-dim: rgba(217,119,6,.1);
  --danger:   #dc2626;
  --danger-dim:rgba(220,38,38,.08);
  --info:     #2563eb;
  --info-dim: rgba(37,99,235,.08);
  --purple:   #7c3aed;
  --purple-dim:rgba(124,58,237,.08);
  --orange:   #ea580c;

  /* ── Status colours (incident cards) ── */
  --c-pending:   #64748b;
  --c-accepted:  #2563eb;
  --c-enroute:   #ea580c;
  --c-arrived:   #7c3aed;
  --c-resolved:  #16a34a;
  --c-rejected:  #dc2626;
  --c-escalated: #d97706;

  /* ── Text ── */
  --t1:   #0f172a;
  --t2:   #475569;
  --t3:   #94a3b8;

  /* ── Typography ── */
  --font:  'Outfit', sans-serif;
  --mono:  'JetBrains Mono', monospace;

  /* Legacy aliases (keeps JS-injected HTML working) */
  --text:  var(--t1);
  --text2: var(--t2);
  --text3: var(--t3);
  --bg2:   #ffffff;
  --bg3:   #f0f2f8;
  --wire2: rgba(15,23,42,.13);
  --ok:    #16a34a;
  --warn:  #d97706;
  --danger:#dc2626;
  --accent:#e05c2a;
  --purple:#7c3aed;
  --orange:#ea580c;
}

html, body { height: 100% }
body {
  background: var(--bg);
  color: var(--t1);
  font-family: var(--font);
  overflow-x: hidden;
  line-height: 1.6;
}

/* Subtle dot-grid texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(circle, rgba(15,23,42,.06) 1px, transparent 1px);
  background-size: 24px 24px;
}

/* ── TOP BAR ───────────────────────────────────────────────── */
.bar {
  background: var(--surface);
  border-bottom: 1px solid var(--wire2);
  padding: 0 28px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 18px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 8px rgba(15,23,42,.06);
}

.bar-logo {
  font-family: var(--mono);
  font-size: .62rem;
  color: var(--accent);
  letter-spacing: .22em;
  text-transform: uppercase;
  font-weight: 500;
}

.bar-name {
  font-size: 1rem;
  font-weight: 700;
  color: var(--t1);
  letter-spacing: -.02em;
}

.bar-station {
  font-family: var(--mono);
  font-size: .6rem;
  color: var(--t3);
  margin-left: 4px;
  font-weight: 400;
}

.bar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 14px;
}

.bar-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: .6rem;
  color: var(--ok);
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 4px 10px;
  background: var(--ok-dim);
  border-radius: 99px;
  border: 1px solid rgba(22,163,74,.2);
}

.led {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--ok);
  animation: led 2.5s ease infinite;
}

@keyframes led {
  0%,100% { opacity: 1; box-shadow: 0 0 5px var(--ok) }
  50%      { opacity: .35; box-shadow: none }
}

.bar-time {
  font-family: var(--mono);
  font-size: .65rem;
  color: var(--t3);
  font-weight: 500;
}

.alert-bell {
  position: relative;
  cursor: pointer;
  background: none;
  border: 1px solid var(--wire2);
  color: var(--t2);
  font-size: 1.05rem;
  padding: 5px 10px;
  border-radius: 8px;
  transition: all .2s;
}
.alert-bell:hover {
  background: var(--danger-dim);
  border-color: rgba(220,38,38,.25);
  color: var(--danger);
}

.bell-badge {
  position: absolute;
  top: -5px; right: -5px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--danger);
  color: #fff;
  font-family: var(--mono);
  font-size: .52rem;
  display: none;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  border: 2px solid var(--surface);
}

/* ── PAGE LAYOUT ─────────────────────────────────────────── */
.page {
  max-width: 940px;
  margin: 0 auto;
  padding: 32px 20px 100px;
  position: relative;
  z-index: 1;
}

/* ── SECTION HEADER ─────────────────────────────────────── */
.sec-hd {
  font-family: var(--mono);
  font-size: .58rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--t3);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;
}
.sec-hd::before {
  content: '';
  width: 20px; height: 2px;
  border-radius: 99px;
  background: var(--accent);
  display: inline-block;
}

.count-badge {
  padding: 2px 10px;
  background: var(--accent-dim);
  border: 1px solid rgba(224,92,42,.2);
  border-radius: 99px;
  color: var(--accent);
  font-size: .58rem;
  font-weight: 600;
}

/* ── INCIDENT CARD ──────────────────────────────────────── */
.inc-card {
  background: var(--surface);
  border: 1px solid var(--wire);
  border-radius: 16px;
  margin-bottom: 16px;
  overflow: hidden;
  transition: all .25s cubic-bezier(.22,1,.36,1);
  box-shadow: 0 1px 4px rgba(15,23,42,.06);
}
.inc-card:hover {
  border-color: var(--wire2);
  box-shadow: 0 6px 24px rgba(15,23,42,.1);
  transform: translateY(-2px);
}

/* Left status stripe */
.inc-card.status-pending   { border-left: 4px solid var(--c-pending)   }
.inc-card.status-accepted  { border-left: 4px solid var(--c-accepted)  }
.inc-card.status-enroute   { border-left: 4px solid var(--c-enroute)   }
.inc-card.status-arrived   { border-left: 4px solid var(--c-arrived)   }
.inc-card.status-resolved  { border-left: 4px solid var(--c-resolved)  }
.inc-card.status-escalated { border-left: 4px solid var(--c-escalated) }

/* Card header (clickable) */
.inc-header {
  padding: 18px 20px 14px 18px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  cursor: pointer;
  user-select: none;
}
.inc-header:hover { background: rgba(15,23,42,.018) }

/* Severity dot */
.inc-sev-dot {
  width: 11px; height: 11px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}
.sev-low      { background: #94a3b8 }
.sev-medium   { background: var(--warn) }
.sev-high     { background: var(--danger) }
.sev-critical {
  background: var(--danger);
  animation: sevFlash .7s ease infinite alternate;
}
@keyframes sevFlash {
  from { box-shadow: none }
  to   { box-shadow: 0 0 10px var(--danger) }
}

/* Title + summary */
.inc-main { flex: 1; min-width: 0 }
.inc-type {
  font-size: .92rem;
  font-weight: 700;
  color: var(--t1);
  text-transform: capitalize;
  margin-bottom: 3px;
  letter-spacing: -.01em;
}
.inc-summary {
  font-family: var(--mono);
  font-size: .64rem;
  color: var(--t2);
  line-height: 1.5;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Status badge */
.inc-status-badge {
  padding: 4px 11px;
  border-radius: 99px;
  font-family: var(--mono);
  font-size: .58rem;
  letter-spacing: .07em;
  text-transform: uppercase;
  border: 1px solid;
  flex-shrink: 0;
  font-weight: 600;
}
.sb-pending   { border-color: rgba(100,116,139,.3); color: var(--c-pending);   background: rgba(100,116,139,.08) }
.sb-accepted  { border-color: rgba(37,99,235,.3);   color: var(--c-accepted);  background: var(--info-dim) }
.sb-enroute   { border-color: rgba(234,88,12,.3);   color: var(--c-enroute);   background: rgba(234,88,12,.08) }
.sb-arrived   { border-color: rgba(124,58,237,.3);  color: var(--c-arrived);   background: var(--purple-dim) }
.sb-resolved  { border-color: rgba(22,163,74,.3);   color: var(--c-resolved);  background: var(--ok-dim) }
.sb-rejected  { border-color: rgba(220,38,38,.3);   color: var(--c-rejected);  background: var(--danger-dim) }
.sb-escalated { border-color: rgba(217,119,6,.3);   color: var(--c-escalated); background: var(--warn-dim) }

/* Card body (detail panel, collapsible) */
.inc-body {
  padding: 0 20px 18px 18px;
  border-top: 1px solid var(--wire);
  background: #fafbfe;
}

/* Detail metadata row */
.inc-detail-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 14px;
  font-family: var(--mono);
  font-size: .62rem;
  color: var(--t2);
}
.inc-detail-row span {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  background: var(--bg3);
  border: 1px solid var(--wire);
  border-radius: 7px;
  font-weight: 500;
}

/* ── ELAPSED TIMER ─────────────────────────────────────── */
.inc-timer {
  font-family: var(--mono);
  font-size: .65rem;
  color: var(--warn);
  margin-left: auto;
  font-weight: 500;
  white-space: nowrap;
  padding: 3px 9px;
  border-radius: 7px;
  background: var(--warn-dim);
  border: 1px solid rgba(217,119,6,.18);
}
.inc-timer.urgent {
  color: var(--danger);
  background: var(--danger-dim);
  border-color: rgba(220,38,38,.2);
  animation: timerPulse 1s ease infinite;
}
@keyframes timerPulse { 50% { opacity: .45 } }

/* ── ESCALATION PILL ───────────────────────────────────── */
.esc-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 99px;
  font-family: var(--mono);
  font-size: .58rem;
  border: 1px solid;
  font-weight: 600;
}
.esc-high { border-color: rgba(220,38,38,.3);  color: var(--danger); background: var(--danger-dim) }
.esc-low  { border-color: rgba(22,163,74,.25); color: var(--ok);     background: var(--ok-dim) }

/* ── ACTION BUTTONS ────────────────────────────────────── */
.action-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}

.action-btn {
  padding: 8px 18px;
  border-radius: 9px;
  border: 1.5px solid;
  background: transparent;
  font-family: var(--font);
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .18s;
  letter-spacing: .01em;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.action-btn:disabled { opacity: .35; cursor: not-allowed }

.btn-accept {
  border-color: rgba(37,99,235,.4);
  color: var(--info);
  background: var(--info-dim);
}
.btn-accept:hover  { background: rgba(37,99,235,.15); border-color: rgba(37,99,235,.7) }

.btn-enroute {
  border-color: rgba(234,88,12,.4);
  color: var(--orange);
  background: rgba(234,88,12,.07);
}
.btn-enroute:hover { background: rgba(234,88,12,.14); border-color: rgba(234,88,12,.7) }

.btn-arrived {
  border-color: rgba(124,58,237,.35);
  color: var(--purple);
  background: var(--purple-dim);
}
.btn-arrived:hover { background: rgba(124,58,237,.15); border-color: rgba(124,58,237,.6) }

.btn-resolve {
  border-color: rgba(22,163,74,.4);
  color: var(--ok);
  background: var(--ok-dim);
}
.btn-resolve:hover { background: rgba(22,163,74,.18); border-color: rgba(22,163,74,.7) }

.btn-reject {
  border-color: rgba(220,38,38,.3);
  color: var(--danger);
  background: transparent;
}
.btn-reject:hover  { background: var(--danger-dim); border-color: rgba(220,38,38,.55) }

.btn-map {
  border-color: var(--wire2);
  color: var(--t2);
  background: var(--bg3);
}
.btn-map:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim) }

/* ── MINI TIMELINE ─────────────────────────────────────── */
.mini-timeline {
  margin-top: 14px;
  border-top: 1px solid var(--wire);
  padding-top: 12px;
  display: none;
}
.mini-tl-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 7px 0;
  font-size: .8rem;
  color: var(--t2);
  border-bottom: 1px solid var(--wire);
}
.mini-tl-row:last-child { border-bottom: none }

.mini-tl-status {
  font-family: var(--mono);
  font-size: .6rem;
  color: var(--accent);
  width: 86px;
  flex-shrink: 0;
  text-transform: uppercase;
  font-weight: 500;
  padding: 2px 7px;
  background: var(--accent-dim);
  border-radius: 5px;
}

.mini-tl-time {
  font-family: var(--mono);
  font-size: .58rem;
  color: var(--t3);
  margin-left: auto;
  flex-shrink: 0;
  white-space: nowrap;
}

/* ── MAP PANEL (officer-side) ──────────────────────────── */
.officer-map-panel {
  display: none;
  margin-top: 14px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--wire2);
  box-shadow: 0 2px 8px rgba(15,23,42,.07);
}
.officer-map-panel.active { display: block }

.officer-map-wrap {}

.map-top-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--wire);
  font-family: var(--mono);
  font-size: .6rem;
  color: var(--t2);
}
.map-live-led {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--orange);
  animation: led 1.2s ease infinite;
}

/* ── CSS for JS-injected officer/citizen markers ────────── */
.officer-marker-icon {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--orange);
  border: 3px solid #fff;
  box-shadow: 0 0 0 3px rgba(234,88,12,.25), 0 2px 8px rgba(234,88,12,.5);
  animation: officerPing 1.6s ease infinite;
}
@keyframes officerPing {
  0%,100% { box-shadow: 0 0 0 3px rgba(234,88,12,.25), 0 2px 8px rgba(234,88,12,.5) }
  50%      { box-shadow: 0 0 0 7px rgba(234,88,12,0),   0 2px 14px rgba(234,88,12,.4) }
}

.citizen-marker-icon {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--info);
  border: 3px solid #fff;
  box-shadow: 0 0 0 3px rgba(37,99,235,.2), 0 2px 6px rgba(37,99,235,.5);
}

/* ── RESOLVE MODAL ─────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,.45);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.on { display: flex }

.modal {
  background: var(--surface);
  border: 1px solid var(--wire2);
  border-radius: 20px;
  padding: 28px 26px;
  width: min(440px, 92vw);
  position: relative;
  box-shadow: 0 24px 64px rgba(15,23,42,.18);
  animation: modalPop .25s cubic-bezier(.22,1,.36,1);
}
@keyframes modalPop {
  from { transform: scale(.94); opacity: 0 }
  to   { transform: scale(1);   opacity: 1 }
}

.modal-title {
  font-size: 1.1rem;
  font-weight: 800;
  margin-bottom: 20px;
  color: var(--t1);
  letter-spacing: -.02em;
}

.modal-label {
  font-family: var(--mono);
  font-size: .6rem;
  color: var(--t3);
  letter-spacing: .14em;
  text-transform: uppercase;
  margin-bottom: 7px;
  font-weight: 500;
}

.modal-input {
  width: 100%;
  background: var(--bg3);
  border: 1.5px solid var(--wire2);
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--t1);
  font-family: var(--font);
  font-size: .88rem;
  outline: none;
  margin-bottom: 16px;
  transition: border-color .2s;
}
.modal-input:focus { border-color: var(--accent) }
.modal-input::placeholder { color: var(--t3) }

.modal-btns { display: flex; gap: 10px }

.modal-confirm {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: var(--ok);
  color: #fff;
  font-family: var(--font);
  font-size: .9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .18s;
  letter-spacing: -.01em;
}
.modal-confirm:hover { background: #15803d; transform: translateY(-1px) }

.modal-cancel {
  padding: 12px 20px;
  border-radius: 10px;
  border: 1.5px solid var(--wire2);
  background: transparent;
  color: var(--t2);
  font-family: var(--font);
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.modal-cancel:hover { border-color: var(--danger); color: var(--danger) }

.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  background: var(--bg3);
  border: 1px solid var(--wire);
  color: var(--t3);
  font-size: 1rem;
  cursor: pointer;
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
}
.modal-close:hover { background: var(--danger-dim); color: var(--danger); border-color: rgba(220,38,38,.3) }

/* ── EMPTY STATE ───────────────────────────────────────── */
.empty {
  text-align: center;
  padding: 72px 20px;
  color: var(--t3);
  font-family: var(--mono);
  font-size: .72rem;
  letter-spacing: .08em;
}
.empty-icon {
  font-size: 2.8rem;
  margin-bottom: 14px;
  opacity: .35;
}

/* ── TOAST ─────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 28px; right: 28px;
  z-index: 999;
  padding: 12px 20px;
  border-radius: 12px;
  font-family: var(--font);
  font-size: .82rem;
  font-weight: 600;
  display: none;
  align-items: center;
  gap: 8px;
  animation: toastIn .28s cubic-bezier(.22,1,.36,1);
  max-width: 340px;
  box-shadow: 0 8px 28px rgba(15,23,42,.15);
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(14px) }
  to   { opacity: 1; transform: translateY(0) }
}
.toast.ok  {
  background: #f0fdf4;
  border: 1.5px solid rgba(22,163,74,.3);
  color: var(--ok);
  display: flex;
}
.toast.err {
  background: #fef2f2;
  border: 1.5px solid rgba(220,38,38,.25);
  color: var(--danger);
  display: flex;
}

/* ── ANIMATIONS ────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px) }
  to   { opacity: 1; transform: translateY(0) }
}
.fu {
  opacity: 0;
  animation: fadeUp .38s cubic-bezier(.22,1,.36,1) forwards;
}

/* Staggered cards */
#alertsContainer .inc-card:nth-child(1) { animation-delay: .04s }
#alertsContainer .inc-card:nth-child(2) { animation-delay: .09s }
#alertsContainer .inc-card:nth-child(3) { animation-delay: .14s }
#alertsContainer .inc-card:nth-child(4) { animation-delay: .19s }
#alertsContainer .inc-card:nth-child(5) { animation-delay: .24s }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="bar">
  <span class="bar-logo"></span>
  <span class="bar-name">
    {{ officer.full_name|default:"Officer" }}
    <span class="bar-station">· {{ officer.station.name|default:"" }}</span>
  </span>
  <div class="bar-right">
    <div class="bar-status"><span class="led"></span>ON DUTY</div>
    <button class="alert-bell" id="alertBell" onclick="scrollToTop()" title="New alerts">
      🔔 <span class="bell-badge" id="bellBadge">0</span>
    </button>
    <span class="bar-time" id="barTime">—</span>
  </div>
</div>

<!-- RESOLVE MODAL -->
<div class="modal-overlay" id="resolveModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">Resolve Incident</div>
    <div class="modal-label">Resolution note (optional)</div>
    <textarea class="modal-input" id="resolveNote" rows="3" placeholder="Describe how the incident was resolved…"></textarea>
    <div class="modal-label">Was the AI classification correct?</div>
    <select class="modal-input" id="aiCorrect">
      <option value="">— select —</option>
      <option value="true">Yes, AI was correct</option>
      <option value="false">No, AI was wrong</option>
    </select>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmResolve()">✓ Mark Resolved</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- PAGE -->
<div class="page">
  <div class="sec-hd">
    Active Incidents
    <span class="count-badge" id="countBadge">0</span>
  </div>
  <div id="alertsContainer">
    <div class="empty"><div class="empty-icon">📋</div>No active incidents assigned</div>
  </div>
</div>

<script>
const POLL = 5000;
let resolveAlertId = null;
let timers = {};  // alert_id → elapsed seconds

// ── Clock ─────────────────────────────────────────────────────────────────────
(function tick() {
  const el = document.getElementById('barTime');
  if (el) el.textContent = new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}) + ' IST';
  setTimeout(tick, 1000);
})();

function getCSRF() {
  const c = document.cookie.split('; ').find(r => r.startsWith('csrftoken='));
  return c ? decodeURIComponent(c.split('=')[1]) : '';
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = (type === 'ok' ? '✓ ' : '✗ ') + msg;
  el.className = `toast ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = 'toast'; }, 3000);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtSecs(s) {
  if (s == null || s < 0) return '0s';
  if (s < 60)   return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}

const STATUS_LABELS = {
  pending:'Pending', accepted:'Accepted', enroute:'En Route',
  arrived:'Arrived', resolved:'Resolved', rejected:'Rejected', escalated:'Escalated'
};
const NEXT_ACTION = {
  escalated: [
              { status:'accepted', label:'Accept', cls:'accept' },
            ],
  pending:  [{ status:'accepted', label:'Accept',     cls:'accept' },
             { status:'rejected', label:'Reject',     cls:'reject' }],
  accepted: [{ status:'enroute',  label:'Start / En Route', cls:'enroute' },
             { status:'rejected', label:'Reject',     cls:'reject' }],
  enroute:  [{ status:'arrived',  label:'Arrived',    cls:'arrived' }],
  arrived:  [{ status:'resolved', label:'Resolve',    cls:'resolve' }],
};

// ── Render ────────────────────────────────────────────────────────────────────
function renderAlerts(alerts) {
  const container = document.getElementById('alertsContainer');
  document.getElementById('countBadge').textContent = alerts.length;

  const newPending = alerts.filter(a => a.status === 'pending').length;
  const bell = document.getElementById('bellBadge');
  bell.style.display = newPending > 0 ? 'flex' : 'none';
  bell.textContent = newPending;

  if (!alerts.length) {
    container.innerHTML = '<div class="empty fu"><div class="empty-icon">✅</div>No active incidents — all clear</div>';
    return;
  }

  container.innerHTML = alerts.map(a => renderCard(a)).join('');

  // Start per-card elapsed timers
  alerts.forEach(a => startElapsedTimer(a.id, a.elapsed_seconds || 0));
}

function renderCard(a) {
  const esc = a.escalation_probability || 0;
  const escHtml = `<span class="esc-pill ${esc >= 60 ? 'esc-high' : 'esc-low'}">ESC ${esc}%</span>`;
  const actions = (NEXT_ACTION[a.status] || []).map(act => {
    if (act.status === 'resolved') {
      return `<button class="action-btn btn-resolve" onclick="openResolveModal(${a.id})">✔ ${act.label}</button>`;
    }
    return `<button class="action-btn btn-${act.cls}" onclick="updateStatus(${a.id},'${act.status}')">${act.label}</button>`;
  }).join('');

  const mapBtn = a.maps_url ? `<a class="action-btn btn-map" href="${a.maps_url}" target="_blank" rel="noopener">📍 Map</a>` : '';
  const trackBtn = (a.status === 'enroute' || a.status === 'arrived')
  ? `<a class="action-btn btn-map" href="/officer/track/${a.id}/" target="_blank" style="background:rgba(37,99,235,.09);border-color:rgba(37,99,235,.35);color:var(--info)">🗺 Navigate</a>`
  : '';

  return `
    <div class="inc-card status-${a.status} fu" id="card-${a.id}">
      <div class="inc-header" onclick="toggleTimeline(${a.id})">
        <div class="inc-sev-dot sev-${a.severity}"></div>
        <div class="inc-main">
          <div class="inc-type">#${a.id} · ${a.crime_type || 'Incident'}</div>
          <div class="inc-summary">${a.summary || a.incident_text}</div>
        </div>
        <span class="inc-status-badge sb-${a.status}">${STATUS_LABELS[a.status] || a.status}</span>
        <span class="inc-timer ${a.elapsed_seconds > 120 ? 'urgent' : ''}" id="timer-${a.id}">
          ${fmtSecs(a.elapsed_seconds)}
        </span>
      </div>

      <div class="inc-body">
        <div class="inc-detail-row">
          ${a.ward    ? `<span>📍 ${a.ward}</span>` : ''}
          ${a.landmark? `<span>🏢 ${a.landmark}</span>` : ''}
          ${a.severity_score!=null ? `<span>⚡ Risk ${a.severity_score}/10</span>` : ''}
          ${escHtml}
          ${a.station ? `<span>🏛 ${a.station.name}</span>` : ''}
        </div>

        <div class="action-bar">
          ${actions}
          ${mapBtn}${trackBtn}
          <button class="action-btn btn-map" onclick="toggleTimeline(${a.id})" style="margin-left:auto">History ▾</button>
        </div>

        <div class="mini-timeline" id="tl-${a.id}">
          <div style="font-family:var(--mono);font-size:.6rem;color:var(--text3);padding:6px 0">Loading…</div>
        </div>

        <div class="officer-map-panel ${a.status === 'enroute' || a.status === 'arrived' ? 'active' : ''}" id="omap-panel-${a.id}">
          <div class="officer-map-wrap">
            <div class="map-top-bar">
              <span class="map-live-led"></span>
              
              
            </div>
            
          </div>
        </div>

      </div>
    </div>`;
}

// ── Per-card elapsed timer ────────────────────────────────────────────────────
function startElapsedTimer(id, initSecs) {
  if (timers[id]) clearInterval(timers[id]);
  let secs = initSecs;
  timers[id] = setInterval(() => {
    secs++;
    const el = document.getElementById(`timer-${id}`);
    if (!el) { clearInterval(timers[id]); return; }
    el.textContent = fmtSecs(secs);
    el.className = `inc-timer ${secs > 120 ? 'urgent' : ''}`;
  }, 1000);
}

// ── Toggle timeline ───────────────────────────────────────────────────────────
function toggleTimeline(id) {
  const el = document.getElementById(`tl-${id}`);
  if (!el) return;
  const open = el.style.display === 'block';
  el.style.display = open ? 'none' : 'block';
  if (!open) fetchTimeline(id, el);
}

async function fetchTimeline(id, el) {
  try {
    const res = await fetch(`/api/incident/timeline/${id}/`);
    const data = await res.json();
    if (data.timeline && data.timeline.length) {
      el.innerHTML = data.timeline.map(t => `
        <div class="mini-tl-row">
          <span class="mini-tl-status">${t.status_label}</span>
          <span style="flex:1;font-size:.75rem;color:var(--text2)">${t.note}</span>
          <span class="mini-tl-time">${t.timestamp_fmt}</span>
        </div>`).join('');
    } else {
      el.innerHTML = '<div style="font-family:var(--mono);font-size:.6rem;color:var(--text3);padding:6px">No timeline entries yet</div>';
    }
  } catch(e) {
    el.innerHTML = '<div style="color:var(--danger);font-family:var(--mono);font-size:.6rem;padding:6px">Failed to load timeline</div>';
  }
}

// ── Status update ─────────────────────────────────────────────────────────────
async function updateStatus(alertId, newStatus, note = '') {
  try {
    const res = await fetch('/api/incident/update-status/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRF() },
      body: JSON.stringify({ alert_id: alertId, status: newStatus, note }),
    });
    const data = await res.json();
    if (data.status === 'ok') {
      showToast(`Status updated to ${STATUS_LABELS[newStatus] || newStatus}`);
      fetchAlerts(); // refresh immediately
    } else {
      showToast(data.error || 'Update failed', 'err');
    }
  } catch(e) {
    showToast('Network error', 'err');
  }
}

let watchId = null;

function startTracking() {
  if (!navigator.geolocation) {
    console.error("Geolocation not supported");
    return;
  }

  watchId = navigator.geolocation.watchPosition(
    async (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      try {
        await fetch("/api/officer/update-location/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRF()
          },
          body: JSON.stringify({
            latitude: lat,
            longitude: lon
          })
        });

        console.log("📍 Location updated:", lat, lon);
      } catch (e) {
        console.error("Location update failed");
      }
    },
    (err) => {
      console.error("GPS error:", err);
    },
    {
      enableHighAccuracy: true,
      maximumAge: 5000,
      timeout: 10000
    }
  );
}

function stopTracking() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
}

window.addEventListener('DOMContentLoaded', () => {
  startTracking();
});


// ── Resolve modal ─────────────────────────────────────────────────────────────
function openResolveModal(id) {
  resolveAlertId = id;
  document.getElementById('resolveNote').value = '';
  document.getElementById('aiCorrect').value = '';
  document.getElementById('resolveModal').classList.add('on');
}
function closeModal() {
  document.getElementById('resolveModal').classList.remove('on');
  resolveAlertId = null;
}
async function confirmResolve() {
  if (!resolveAlertId) return;
  const note = document.getElementById('resolveNote').value.trim();
  const aiOk = document.getElementById('aiCorrect').value;
  await updateStatus(resolveAlertId, 'resolved', note);

  // Also post feedback
  if (aiOk !== '') {
    fetch('/api/incident/feedback/', {
      method:'POST',
      headers:{'Content-Type':'application/json','X-CSRFToken':getCSRF()},
      body: JSON.stringify({ alert_id: resolveAlertId, ai_correct: aiOk === 'true' }),
    }).catch(() => {});
  }
  closeModal();
}

// ── Fetch alerts ──────────────────────────────────────────────────────────────
async function fetchAlerts() {
  try {
    const res = await fetch('/api/incident/officer-alerts/');
    if (!res.ok) return;
    const data = await res.json();
    renderAlerts(data.alerts || []);
  } catch(e) {
    console.error('[fetchAlerts]', e);
  }
}

function scrollToTop() { window.scrollTo({ top:0, behavior:'smooth' }); }

// ── Officer-side live map (Ola/Uber style) ────────────────────────────────────
const officerMaps  = {};  // alert_id → { map, officerMarker, citizenMarker, routeLayer, lastPos, lastRoutePos }

function ensureOfficerMap(alertId, incLat, incLon) {
  if (officerMaps[alertId]) return officerMaps[alertId];

  const el = document.getElementById(`omap-${alertId}`);
  if (!el) return null;

  const center = incLat ? [incLat, incLon] : [19.2183, 72.9781];
  const map = L.map(el, { zoomControl: true, attributionControl: false }).setView(center, 15);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO'
  }).addTo(map);

  // Static incident pin (red)
  let incidentMarker = null;
  if (incLat && incLon) {
    const redIcon = L.divIcon({
      html: `<div style="width:12px;height:12px;border-radius:50%;background:#ef4444;border:3px solid #fff;box-shadow:0 0 8px rgba(239,68,68,.8)"></div>`,
      iconSize: [12, 12], iconAnchor: [6, 6], className: ''
    });
    incidentMarker = L.marker([incLat, incLon], { icon: redIcon })
      .addTo(map).bindPopup('<b>📍 Incident Location</b>');
  }

  const state = {
    map, incidentMarker,
    officerMarker: null,
    citizenMarker: null,
    routeLayer: null,
    lastPos: null,
    lastRoutePos: null,
  };
  officerMaps[alertId] = state;

  // Force Leaflet to recalculate size after DOM paint
  setTimeout(() => map.invalidateSize(), 150);
  return state;
}

function animateOfficerMarker(state, toLat, toLon) {
  if (!state.lastPos) {
    state.officerMarker.setLatLng([toLat, toLon]);
    return;
  }
  const from = state.lastPos;
  const start = performance.now();
  const duration = 1200;

  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    const lat = from.lat + (toLat - from.lat) * t;
    const lon = from.lon + (toLon - from.lon) * t;
    state.officerMarker.setLatLng([lat, lon]);
    if (t < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

async function drawOfficerRoute(state, alertId, oLat, oLon, cLat, cLon) {
  if (!state.map) return;

  // Skip if officer barely moved
  if (state.lastRoutePos) {
    const dx = Math.abs(oLat - state.lastRoutePos.lat);
    const dy = Math.abs(oLon - state.lastRoutePos.lon);
    if (dx < 0.0001 && dy < 0.0001) return;
  }
  state.lastRoutePos = { lat: oLat, lon: oLon };

  try {
    const url = `https://router.project-osrm.org/route/v1/driving/${oLon},${oLat};${cLon},${cLat}?overview=full&geometries=geojson`;
    const res  = await fetch(url);
    const data = await res.json();

    if (data.code !== 'Ok' || !data.routes?.length) return;

    const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
    if (state.routeLayer) state.map.removeLayer(state.routeLayer);
    state.routeLayer = L.polyline(coords, {
      color: '#38bdf8', weight: 4, opacity: .8, lineCap: 'round', lineJoin: 'round'
    }).addTo(state.map);

    const etaSec = data.routes[0].duration;
    const distKm = (data.routes[0].distance / 1000).toFixed(1);
    const etaMin = Math.ceil(etaSec / 60);
    const etaEl  = document.getElementById(`omap-eta-${alertId}`);
    if (etaEl) etaEl.textContent = `~${etaMin} min · ${distKm} km`;

  } catch (e) {
    // Fallback dashed line
    if (state.routeLayer) state.map.removeLayer(state.routeLayer);
    state.routeLayer = L.polyline([[oLat, oLon], [cLat, cLon]], {
      color: '#38bdf8', weight: 2, opacity: .5, dashArray: '6 4'
    }).addTo(state.map);
  }
}

async function refreshOfficerMap(alertId, incLat, incLon, officerLat, officerLon) {
  const panel = document.getElementById(`omap-panel-${alertId}`);
  if (!panel) return;

  // Activate panel
  panel.classList.add('active');

  const state = ensureOfficerMap(alertId, incLat, incLon);
  if (!state) return;

  // Update/create officer marker (orange, pulsing)
  const orangeIcon = L.divIcon({
    html: `<div class="officer-marker-icon"></div>`,
    iconSize: [16, 16], iconAnchor: [8, 8], className: ''
  });

  if (state.officerMarker) {
    animateOfficerMarker(state, officerLat, officerLon);
  } else {
    state.officerMarker = L.marker([officerLat, officerLon], { icon: orangeIcon })
      .addTo(state.map).bindPopup('<b>🚔 You (Officer)</b>');
  }

  // Fetch citizen location and update their marker
  try {
    const res  = await fetch(`/api/incident/citizen-location-read/${alertId}/`);
    const data = await res.json();

    if (data.available && data.latitude && data.longitude) {
      const blueIcon = L.divIcon({
        html: `<div class="citizen-marker-icon"></div>`,
        iconSize: [14, 14], iconAnchor: [7, 7], className: ''
      });
      if (state.citizenMarker) {
        state.citizenMarker.setLatLng([data.latitude, data.longitude]);
      } else {
        state.citizenMarker = L.marker([data.latitude, data.longitude], { icon: blueIcon })
          .addTo(state.map).bindPopup('<b>🙋 Citizen / Incident</b>');
      }

      // Draw route: officer → citizen
      drawOfficerRoute(state, alertId, officerLat, officerLon, data.latitude, data.longitude);

      // Fit bounds to show both
      const bounds = L.latLngBounds([
        [officerLat, officerLon],
        [data.latitude, data.longitude]
      ]);
      state.map.fitBounds(bounds, { padding: [40, 40] });

    } else if (incLat && incLon) {
      // Fallback: route to incident coordinates
      drawOfficerRoute(state, alertId, officerLat, officerLon, incLat, incLon);
      const bounds = L.latLngBounds([[officerLat, officerLon], [incLat, incLon]]);
      state.map.fitBounds(bounds, { padding: [40, 40] });
    }
  } catch (e) { /* silent */ }

  state.lastPos = { lat: officerLat, lon: officerLon };
}

// ── Poll officer's own GPS and push to all active maps ─────────────────────────
let myLat = null, myLon = null;

// Extend startTracking to also store coordinates locally
const _origStartTracking = startTracking;
// Re-define startTracking to capture coords for maps
function startTracking() {
  if (!navigator.geolocation) return;
  watchId = navigator.geolocation.watchPosition(
    async (pos) => {
      myLat = pos.coords.latitude;
      myLon = pos.coords.longitude;
      try {
        await fetch("/api/officer/update-location/", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-CSRFToken": getCSRF() },
          body: JSON.stringify({ latitude: myLat, longitude: myLon })
        });
      } catch (e) {}
    },
    (err) => console.error("GPS error:", err),
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
  );
}

// ── Extend fetchAlerts to also refresh maps ────────────────────────────────────
const _origFetchAlerts = fetchAlerts;
async function fetchAlerts() {
  try {
    const res = await fetch('/api/incident/officer-alerts/');
    if (!res.ok) return;
    const data = await res.json();
    renderAlerts(data.alerts || []);

    // After render, refresh maps for en-route/arrived alerts
    if (myLat && myLon) {
      (data.alerts || []).forEach(a => {
        if (a.status === 'enroute' || a.status === 'arrived') {
          // Small delay to let DOM render the card first
          setTimeout(() => {
            refreshOfficerMap(
              a.id,
              a.latitude  ? parseFloat(a.latitude)  : null,
              a.longitude ? parseFloat(a.longitude) : null,
              myLat, myLon
            );
          }, 200);
        }
      });
    }
  } catch(e) {
    console.error('[fetchAlerts]', e);
  }
}
// ── Boot ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  fetchAlerts();
  setInterval(fetchAlerts, POLL);
});
</script>
</body>
</html>
