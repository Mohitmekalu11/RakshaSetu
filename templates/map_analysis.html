<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime Heatmap</title>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- ✅ Correct Heatmap Library -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@latest/dist/leaflet-heat.js"></script>

    <style>
        #map { height: 600px; width: 100%; }
        .legend {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
            font-size: 14px;
        }
        .legend div {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        .legend span {
            width: 20px;
            height: 10px;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="legend" class="legend">
        <div><span style="background: green"></span> Low Crime (Safe Zone)</div>
        <div><span style="background: yellow"></span> Moderate Crime (Caution)</div>
        <div><span style="background: orange"></span> High Crime (Risk Zone)</div>
        <div><span style="background: red"></span> Severe Crime (Danger Zone)</div>
    </div>

    <script>
        console.log("Leaflet Heat Layer Available:", typeof L.heatLayer); // Debugging

        // Initialize Leaflet map
        var map = L.map('map').setView([20.5937, 78.9629], 5); // Centered on India

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // ✅ Initialize an empty heatmap layer
        var heatLayer = L.heatLayer([], {
            radius: 20,
            blur: 15,
            maxZoom: 12,
            gradient: {  
                0.2: "green",   // Low Crime (Safe Zone)
                0.4: "yellow",  // Moderate Crime (Caution)
                0.6: "orange",  // High Crime (Risk Zone)
                1.0: "red"      // Severe Crime (Danger Zone)
            }
        }).addTo(map);

        // ✅ Fetch crime data from Django API
        fetch("{% url 'crime_data_api' %}")  
        .then(response => {
            if (!response.ok) {
                throw new Error("Failed to load crime data.");
            }
            return response.json();
        })
        .then(data => {
            console.log("Crime Data Loaded:", data); // Debugging
            
            if (!Array.isArray(data)) {
                throw new Error("Invalid data format.");
            }

            var heatData = data.map(item => [
                parseFloat(item.Latitude), 
                parseFloat(item.Longitude), 
                parseFloat(item.intensity)
            ]);

            heatLayer.setLatLngs(heatData);  // ✅ Set heatmap points

            // ✅ Add markers with safety score popups
            data.forEach(item => {
                var marker = L.marker([parseFloat(item.Latitude), parseFloat(item.Longitude)])
                    .bindPopup(`
                        <b>Crime Intensity:</b> ${item.intensity} <br>
                        <b>Safety Score:</b> ${item.safety_score}
                    `)
                    .addTo(map);
            });

        })
        .catch(error => {
            console.error("Error loading data:", error);
            alert("Error loading crime data. Please try again later.");
        });

    </script>
</body>
</html>
