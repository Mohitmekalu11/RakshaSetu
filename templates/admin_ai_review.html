{% extends "admin(base).html" %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Crime Report Review</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0c0a09; /* Zinc 950 */
    }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
    }
    .photo-grid img {
      width: 100%;
      height: auto;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .photo-grid img:hover {
      transform: scale(1.05);
    }
    .message-box {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 1.5rem;
      background-color: #3f3f46; /* Zinc 700 */
      border: 1px solid #52525b; /* Zinc 600 */
      border-radius: 0.75rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      z-index: 1000;
      text-align: center;
    }
  </style>
</head>
<body class="antialiased text-white flex items-center justify-center min-h-screen p-4 sm:p-8">

  <!-- Main Container -->
  <div id="ai-review-container" class="w-full max-w-4xl p-8 bg-zinc-800 rounded-2xl shadow-2xl space-y-8 border border-zinc-700">
    <div class="space-y-2 text-center">
      <h1 class="text-4xl font-bold text-gray-100">AI Crime Report Review</h1>
      <p class="text-zinc-400">Review and validate the automated analysis of a reported incident.</p>
    </div>

    <!-- Report Details Section -->
    <div class="bg-zinc-700 p-6 rounded-xl space-y-4">
      <h2 class="text-2xl font-semibold text-gray-200">Report Details</h2>
      <p><b class="text-zinc-300">Type:</b> <span id="report-type"></span></p>
      <p><b class="text-zinc-300">Description:</b> <span id="report-description"></span></p>
      <p><b class="text-zinc-300">Location:</b> <span id="report-location"></span></p>
    </div>

    <!-- Video Section -->
    <div id="video-section" class="bg-zinc-700 p-6 rounded-xl hidden">
      <h3 class="text-2xl font-semibold text-gray-200">Uploaded Video</h3>
      <video id="video-player" controls class="w-full rounded-lg mt-4 border border-zinc-600">
        Your browser does not support the video tag.
      </video>
    </div>
    
    <!-- Photos Section -->
    <div id="photos-section" class="bg-zinc-700 p-6 rounded-xl">
      <h3 class="text-2xl font-semibold text-gray-200">Uploaded Photos</h3>
      <div id="photo-grid" class="photo-grid mt-4"></div>
    </div>

    <!-- AI Detection Results Section -->
    <div class="bg-zinc-700 p-6 rounded-xl">
      <h3 class="text-2xl font-semibold text-gray-200">AI Detection Results</h3>
      <ul class="mt-4 space-y-2 text-lg">
        <li id="weapon-result"></li>
        <li id="violence-result"></li>
        <li id="deepfake-result"></li>
      </ul>
    </div>

    <!-- Action Buttons -->
    <div class="flex flex-col sm:flex-row justify-end items-center space-y-4 sm:space-y-0 sm:space-x-4">
      <button id="btn-approve" class="w-full sm:w-auto px-6 py-3 rounded-lg font-semibold text-white bg-green-600 hover:bg-green-700 transition-colors shadow-lg">Approve Report</button>
      <button id="btn-reject" class="w-full sm:w-auto px-6 py-3 rounded-lg font-semibold text-white bg-red-600 hover:bg-red-700 transition-colors shadow-lg">Reject Report</button>
    </div>
  </div>

  <script>
    // Mock data to simulate a server-side render
    const mockReportData = {
      crime_type: "Theft",
      description: "A suspect was seen stealing a bicycle from the front of the public library.",
      address: "123 Main Street, Anytown, USA",
      video_url: "https://www.w3schools.com/html/mov_bbb.mp4",
      photos: [
        { url: "https://placehold.co/400x300/F17135/FFF?text=Bike" },
        { url: "https://placehold.co/400x300/318D93/FFF?text=Suspect" },
        { url: "https://placehold.co/400x300/984D4A/FFF?text=Library" }
      ],
      ai_summary: {
        weapon: [false, 0.00],
        violence: [false, 0.15],
        deepfake: [false, 0.05]
      }
    };

    // Helper function to show a temporary message box
    function showMessage(message, type) {
      const existingMessageBox = document.querySelector('.message-box');
      if (existingMessageBox) existingMessageBox.remove();
      
      const messageBox = document.createElement('div');
      messageBox.className = `message-box text-sm md:text-base ${type === 'success' ? 'bg-green-600 border-green-500' : 'bg-red-600 border-red-500'} text-white rounded-lg shadow-xl`;
      messageBox.textContent = message;
      
      document.body.appendChild(messageBox);
      
      setTimeout(() => {
        messageBox.remove();
      }, 3000);
    }

    // Function to render the page with the mock data
    function renderPage(report) {
      // Populate report details
      document.getElementById('report-type').textContent = report.crime_type;
      document.getElementById('report-description').textContent = report.description;
      document.getElementById('report-location').textContent = report.address;

      // Render video section if a URL is provided
      const videoSection = document.getElementById('video-section');
      if (report.video_url) {
        videoSection.classList.remove('hidden');
        document.getElementById('video-player').src = report.video_url;
      } else {
        videoSection.classList.add('hidden');
      }

      // Render photos
      const photoGrid = document.getElementById('photo-grid');
      photoGrid.innerHTML = ''; // Clear previous content
      if (report.photos && report.photos.length > 0) {
        report.photos.forEach(photo => {
          const img = document.createElement('img');
          img.src = photo.url;
          img.alt = "Crime photo";
          img.className = "w-full h-auto rounded-lg";
          photoGrid.appendChild(img);
        });
      } else {
        photoGrid.innerHTML = '<p class="text-zinc-400">No photos uploaded.</p>';
      }

      // Render AI detection results
      const weaponResult = document.getElementById('weapon-result');
      const violenceResult = document.getElementById('violence-result');
      const deepfakeResult = document.getElementById('deepfake-result');
      
      weaponResult.innerHTML = report.ai_summary.weapon[0] ? 
        `✅ Weapons detected (<span class="text-green-300 font-semibold">${report.ai_summary.weapon[1].toFixed(2)}%</span> confidence)` : 
        `❌ No weapons detected`;
      
      violenceResult.innerHTML = report.ai_summary.violence[0] ? 
        `⚠️ Violence detected (<span class="text-orange-300 font-semibold">${report.ai_summary.violence[1].toFixed(2)}%</span> confidence)` : 
        `❌ No violence detected`;

      deepfakeResult.innerHTML = report.ai_summary.deepfake[0] ? 
        `⚠️ Possible Deepfake (<span class="text-orange-300 font-semibold">${report.ai_summary.deepfake[1].toFixed(2)}%</span> confidence)` : 
        `❌ No deepfake signs`;
    }

    // Attach event listeners to buttons
    document.getElementById('btn-approve').addEventListener('click', () => {
      // In a real application, you would send a request to the server
      console.log("Approve button clicked.");
      showMessage("Report has been approved.", "success");
    });

    document.getElementById('btn-reject').addEventListener('click', () => {
      // In a real application, you would send a request to the server
      console.log("Reject button clicked.");
      showMessage("Report has been rejected.", "error");
    });
    
    // Call renderPage on window load
    window.onload = function() {
      renderPage(mockReportData);
    };
  </script>

</body>
</html>
{% endblock content %}
