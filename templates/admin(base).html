{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Approve Police Officers</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    /* Reset & Global Styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e0eafc, #cfdef3);
      color: #333;
    }

    /* Sidebar */
    .sidebar {

      min-height: 100vh;
      background: linear-gradient(135deg, #1a252f, #3a8391);
      padding: 20px;
      color: #fff;
      transition: all 0.3s ease;
      font-size: 1rem;
    }
    

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo img {                                                                   
      width: 250px;
      height: 60px;
      transition: transform 0.3s ease-in-out;
    }
    .logo img:hover {
      transform: scale(1.1);
    }

    .sidebar h4 {
      text-align: center;
      margin-bottom: 1rem;
      font-size: 1.4rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .sidebar a {
      color: #fff;
      text-decoration: none;
      padding: 12px 15px;
      display: flex;
      align-items: center;
      border-radius: 5px;
      margin-bottom: 10px;
      transition: all 0.3s ease-in-out;
      font-size: 1rem;
      font-weight: 500;
    }
    .nav li a {
      text-decoration: none;
      color: #f0f0f0;
      font-size: 18px;
      display: flex;
      align-items: center;
      padding: 10px;
      border-radius: 5px;
      
    }
    .nav li a i {
      margin-right: 10px;
      font-size: 20px;
    }
    .nav li a:hover,
    .nav li.active a {
      background: rgba(255, 255, 255, 0.19);
      color: #fff;
    }
    .sidebar a i {
      width: 25px;
      margin-right: 10px;
      font-size: 1.2rem;
    }

    .sidebar a:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateX(5px);
    }

    /* Animated HR */
    .animate-hr {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.3);
      width: 0;
      opacity: 0;
      margin: 30px 0;
      animation: hrReveal 1s forwards;
    }
    /* Delay the second hr if desired */
    .animate-hr.delay {
      animation-delay: 0s;
    }
    @keyframes hrReveal {
      to {
        width: 100%;
        opacity: 10;
      }
    }

    /* Main Content */
    .main-content {
      padding: 40px;
      background: #f8f9fa;
      min-height: 100vh;
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      color: #2c3e50;
      font-weight: bold;
      text-align: center;
      margin-bottom: 25px;
    }

    /* Table Styling */
    .table-striped tbody tr:nth-of-type(odd) {
      background-color: #f2f2f2;
    }
    .table thead {
      background-color: #2c3e50;
      color: #fff;
    }
    .table tbody tr {
      transition: all 0.3s ease-in-out;
    }
    .table tbody tr:hover {
      transform: translateX(5px);
      background-color: #e9ecef;
    }

    /* Buttons */
    .btn {
      border-radius: 25px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    /* ID Card Styling */
    .id-card-img {
      width: 120px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #ddd;
      transition: transform 0.3s ease-in-out;
    }
    .id-card-img:hover {
      transform: scale(1.1);
    }
    
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <nav class="col-md-2 sidebar d-none d-md-block">
        <div class="logo">
          <img src="{% static 'logo_rs.png' %}" alt="Logo">
        </div>
        <!-- Animated HR before Admin Panel Text -->
        <hr class="animate-hr">
        <!-- Animated HR after Admin Panel Text -->
  
        <ul class="nav">
          <li class="{% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
            <a href="{% url 'admin_dashboard' %}"><i class="fas fa-home"></i> Dashboard</a>
          </li>
         
        
        <li class="{% if request.resolver_match.url_name == 'index' %}active{% endif %}">
          <a href="{% url 'index' %}"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </li>
        </ul>
      </nav>
      {% block content %}
      {% endblock content %}
    </div>
  </div>
  
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
