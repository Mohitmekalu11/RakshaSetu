{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHO Signup</title>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    /* ---- global ---- */
    * { margin:0; padding:0; box-sizing:border-box; font-family:"Trebuchet MS",Arial,sans-serif; }
    body { display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:auto; position:relative; }
    #background-video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-1; }
    .popup-message { display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#fff; color:#000; padding:15px; border-radius:8px; box-shadow:0 0 20px rgba(0,0,0,0.3); z-index:1000; animation:slideDown .5s forwards; }
    @keyframes slideDown { from{opacity:0; transform:translate(-50%,-50px)} to{opacity:1; transform:translate(-50%,0)} }

    /* ---- form container ---- */
    .form-box { position:relative; z-index:1; width:520px; background:rgba(0,0,0,0.5); backdrop-filter:blur(10px); border:2px solid rgba(0,0,0,0.2); box-shadow:0 4px 8px rgba(0,0,0,0.6); color:#fff; padding:20px; border-radius:10px; }

    /* ---- progress bar ---- */
    .progress-container { width:100%; background:#333; border-radius:5px; overflow:hidden; margin-bottom:20px; }
    .progress-bar { width:0; height:6px; background:#FFD700; transition:width .4s ease; }

    /* ---- step message ---- */
    .step-message { text-align:center; margin-bottom:15px; font-size:1.1rem; color:#FFD700; min-height:1.4em; }

    /* ---- form steps ---- */
    .form-step { display:none; }
    .form-step.active { display:block; animation:fadeIn .5s ease; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

    .form-box h2 { text-align:center; font-size:2.2rem; margin-bottom:1rem; }

    .input-box { display:flex; align-items:center; background:transparent; border:2px solid rgba(255,255,255,0.4); border-radius:25px; height:50px; margin:15px 0; padding:0 15px; }
    .input-box .icon { font-size:1.2rem; color:#fff; margin-right:10px; }
    .input-box input,
    .input-box select { 
        flex:1; 
        background:transparent; 
        border:none; 
        outline:none; 
        color:#fff;
        font-size:1rem;
    }
    
    .input-box input::placeholder { color:rgba(255,255,255,0.7); }

    /* --- New Dropdown Styles --- */
    .input-box select {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath%20d%3D%22M5%208l5%205%205-5z%22%20fill%3D%22%23ffffff%22/%3E%3C/svg%3E');
        background-repeat: no-repeat;
        background-position: right 10px center;
        padding-right: 30px; /* Add space for the custom arrow */
        color: white; /* Ensure selected text is white */
    }

    /* Style for dropdown options, ensuring they are readable */
    .input-box select option {
        background-color: #110e24; /* Dark background for options */
        color: #fff; /* White text for options */
    }
    
    .input-box select option[disabled] {
        color: rgba(255, 255, 255, 0.7); /* Faded color for the placeholder */
    }
    /* --- End of New Dropdown Styles --- */

    .button-group { display:flex; justify-content:space-between; margin-top:20px; }
    .btn-next, .btn-prev, .btn-submit {
      padding:10px 20px; border:none; border-radius:25px; cursor:pointer; font-size:1rem; transition:background .3s;
    }
    .btn-next { background:#35b6d2; color:#fff; }
    .btn-prev { background:rgba(255,255,255,0.4); color:#000; }
    .btn-submit { background:#fff; color:#02519f; }
    .btn-next:hover { background:#1fa0b8; }
    .btn-prev:hover { background:rgba(255,255,255,0.6); }
    .btn-submit:hover { background:#35b6d2; color:#fff; }

    /* ---- modal overrides & video sizing (unchanged) ---- */
    .modal-backdrop.show { z-index:2040!important; }
    .modal.show { z-index:2050!important; }
    #live-video, #recorded-video { width:400px; height:300px; object-fit:cover; background:#000; border-radius:4px; display:block; }
    #record-btn,#confirm-btn,#retake-btn { margin-top:10px; }
    #recording-message { display:none; margin-top:10px; color:#2ecc71; font-weight:bold; }
    #preview-controls { display:none; gap:10px; justify-content:center; margin-top:10px; }
  </style>
</head>
<body>

  <video id="background-video" autoplay muted loop>
    <source src="{% static 'lg.mp4' %}" type="video/mp4"/>
  </video>

  <div id="popup-message" class="popup-message"></div>

  <div class="form-box">
    <h2>SHO Signup</h2>
    <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
    <div id="step-message" class="step-message">Enter your account details</div>

    <form id="signup-form" method="POST" action="{% url 'signup_sho' %}" enctype="multipart/form-data">

      {% csrf_token %}

      <div class="form-step active">
        <div class="input-box"><span class="icon"><ion-icon name="mail-outline"></ion-icon></span><input type="email" name="email" placeholder="Email" required></div>
        <div class="input-box"><span class="icon"><ion-icon name="person-outline"></ion-icon></span><input type="text" name="username" placeholder="Username" required></div>
        <div class="input-box"><span class="icon toggle-password"><ion-icon name="eye-outline"></ion-icon></span><input type="password" id="password" name="password" placeholder="Password" required></div>
        <div class="input-box"><span class="icon toggle-password"><ion-icon name="lock-closed-outline"></ion-icon></span><input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm Password" required></div>
      </div>

      <div class="form-step">
        <div class="input-box"><span class="icon"><ion-icon name="call-outline"></ion-icon></span><input type="tel" name="phone" placeholder="Phone Number" required></div>
        <div class="input-box"><span class="icon"><ion-icon name="document-outline"></ion-icon></span><input type="file" name="id_card" accept="image/*" required></div>
        <p style="font-size:.85rem;color:#ccc;margin:0 0 15px;">** Upload your official police ID **</p>
        <div class="input-box">
          <span class="icon"><ion-icon name="business-outline"></ion-icon></span>
          <select name="station" required>
            <option value="" disabled {% if not request.POST.station %}selected{% endif %}>Select Police Station</option>
            {% for station in stations %}
              <option value="{{ station.id }}" {% if request.POST.station|stringformat:"s" == station.id|stringformat:"s" %}selected{% endif %}>
                {{ station.name }}
              </option>
            {% endfor %}
          </select>
          
        </div>
        <div class="input-box"><span class="icon"><ion-icon name="shield-outline"></ion-icon></span><input type="text" name="badge_id" placeholder="Badge ID" required></div>
      </div>

      <div class="form-step">
        <div class="input-box">
          <span class="icon"><ion-icon name="ribbon-outline"></ion-icon></span>
          <select name="experience_level" required>
            <option value="" disabled selected>Select Experience Level</option>
            <option value="Junior">Junior</option>
            <option value="Senior">Senior</option>
            <option value="Inspector">Inspector</option>
          </select>
        </div>
        <div class="input-box">
          <span class="icon"><ion-icon name="construct-outline"></ion-icon></span>
          <select name="specialty" required>
            <option value="" disabled selected>Select Specialty</option>
            <option value="Cyber Crime">Cyber Crime</option>
            <option value="Theft">Theft</option>
            <option value="Assault">Assault</option>
            <option value="Fraud">Fraud</option>
            <option value="Narcotics">Narcotics</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="text-center my-3">
          <button type="button" id="start-btn" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#cameraModal">📹 Capture Liveness</button>
        </div>
        <input type="hidden" id="liveness_video" name="liveness_video" required>
        <input type="hidden" id="liveness_frame" name="liveness_frame" required>
      </div>

      <div class="button-group">
        <button type="button" id="prev-btn" class="btn-prev" disabled>« Previous</button>
        <button type="button" id="next-btn" class="btn-next">Next »</button>
        <button type="submit" id="submit-btn" class="btn-submit" style="display:none;">Sign Up</button>
      </div>
    </form>
  </div>

  <div class="modal fade" id="cameraModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Record & Preview</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <video id="live-video" autoplay muted playsinline></video>
        <button id="record-btn" class="btn btn-warning" disabled>▶️ Start Recording</button>
        <video id="recorded-video" controls style="display:none;"></video>
        <div id="preview-controls">
          <button id="confirm-btn" class="btn btn-success">✅ Use Take</button>
          <button id="retake-btn" class="btn btn-secondary">🔄 Retake</button>
        </div>
        <div id="recording-message">Captured successfully!</div>
        <canvas id="frame-canvas" style="display:none;"></canvas>
      </div>
    </div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // multi-step logic
    const steps = document.querySelectorAll('.form-step'),
          nextBtn = document.getElementById('next-btn'),
          prevBtn = document.getElementById('prev-btn'),
          submitBtn = document.getElementById('submit-btn'),
          progressBar = document.getElementById('progress-bar'),
          stepMsg = document.getElementById('step-message');
    let current = 0;
    const messages = [
      'Enter your account details',
      'Great! Now enter station & ID info',
      'Almost done! Add experience & record liveness'
    ];
    function showStep(n) {
      steps.forEach((s,i)=> s.classList.toggle('active', i===n));
      prevBtn.disabled = n===0;
      nextBtn.style.display   = n===steps.length-1 ? 'none' : 'inline-block';
      submitBtn.style.display = n===steps.length-1 ? 'inline-block' : 'none';
      progressBar.style.width = `${(n)/(steps.length-1)*100}%`;
      stepMsg.textContent      = messages[n];
    }
    
    nextBtn.addEventListener('click', ()=> { current++; showStep(current); });
    prevBtn.addEventListener('click', ()=> { current--; showStep(current); });
    showStep(0);

    // (Existing password toggle, flash, liveness logic stays unchanged)…
    document.querySelectorAll('.toggle-password').forEach(el => {
      el.onclick = () => {
        let inp = el.nextElementSibling, ic = el.querySelector('ion-icon');
        if (inp.type === 'password') {
          inp.type = 'text'; ic.name = 'eye-off-outline';
        } else {
          inp.type = 'password'; ic.name = 'eye-outline';
        }
      };
    });

    // flash messages
    const popup = document.getElementById('popup-message'), msgs = [];
    {% for message in messages %}
      msgs.push({ tags:'{{ message.tags }}', text:'{{ message }}' });
    {% endfor %}
    msgs.forEach(m => {
      if (m.tags.includes('error')) {
        popup.innerHTML = `<ion-icon name="alert-circle-outline"></ion-icon> ${m.text}`;
        popup.style.display = 'block';
        setTimeout(() => popup.style.display = 'none', 5000);
      }
    });

    const startBtn      = document.getElementById('start-btn'),
          liveVideo     = document.getElementById('live-video'),
          recordedVideo = document.getElementById('recorded-video'),
          recordBtn     = document.getElementById('record-btn'),
          confirmBtn    = document.getElementById('confirm-btn'),
          retakeBtn     = document.getElementById('retake-btn'),
          previewCtr    = document.getElementById('preview-controls'),
          recMsg        = document.getElementById('recording-message'),
          canvas        = document.getElementById('frame-canvas'),
          vidInput      = document.getElementById('liveness_video'),
          frmInput      = document.getElementById('liveness_frame'),
          modalEl       = document.getElementById('cameraModal'),
          modal         = new bootstrap.Modal(modalEl);

    let stream, recorder, chunks = [];

    // when modal opens → get camera
    modalEl.addEventListener('show.bs.modal', async () => {
      stream = await navigator.mediaDevices.getUserMedia({ video: true });
      liveVideo.srcObject = stream;
      recordBtn.disabled = false;
      liveVideo.style.width  = "400px";
      liveVideo.style.height = "300px";
      liveVideo.style.objectFit = "cover";
      recordedVideo.style.display = 'none';
      liveVideo.style.display = 'block';
      previewCtr.style.display = 'none';
      recMsg.style.display = 'none';
      recordBtn.textContent = '▶️ Start Recording';
    });

    // start / stop recording
    recordBtn.onclick = () => {
      chunks = [];
      recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
      recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
      recorder.onstop = onRecorded;
      recorder.start();
      recordBtn.textContent = '🔴 Recording…';
      recordBtn.disabled = true;
      setTimeout(() => recorder.stop(), 3000);
    };
    function blobToDataURL(blob) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });
    }

    async function onRecorded() {
      // 1) build your blob and URL
      const blob = new Blob(chunks, { type: 'video/webm' });
      const url  = URL.createObjectURL(blob);
    
      // 2) populate and show the playback element
      liveVideo.srcObject       = null;
      liveVideo.style.display   = 'none';
      recordedVideo.src         = url;
      recordedVideo.style.display = 'block';
      previewCtr.style.display  = 'flex';
      recMsg.style.display      = 'block';
      recordBtn.style.display   = 'none';
    
      // 3) video → base64
      vidInput.value = await blobToDataURL(blob);
    
      // 4) extract a frame from a detached <video>
      frmInput.value = await new Promise(resolve => {
        const tmp = document.createElement('video');
        tmp.preload     = 'metadata';
        tmp.muted     = true;
        tmp.playsInline = true;
        tmp.src       = url;
    
        // once metadata is loaded, pick a safe seek time
        tmp.addEventListener('loadedmetadata', () => {
          // if duration is finite and >0, go there; else pick small offset
          const t = isFinite(tmp.duration) && tmp.duration > 0
          ? tmp.duration / 2
          : 0.1;
          tmp.currentTime = t;
        });
    
        // when seek completes, draw to canvas
        tmp.addEventListener('seeked', () => {
          canvas.width  = tmp.videoWidth;
          canvas.height = tmp.videoHeight;
          canvas.getContext('2d').drawImage(tmp, 0, 0);
          URL.revokeObjectURL(url);
          resolve(canvas.toDataURL('image/png'));
        });
      });
    
      // 5) stop camera and enable Use/Retake
      stream.getTracks().forEach(t => t.stop());
      confirmBtn.disabled = false;
      retakeBtn.disabled  = false;
    }
    // confirm & close modal
    confirmBtn.onclick = () => modal.hide();

    // retake
    retakeBtn.onclick = async () => {
      // 1) hide preview + reset buttons
      recordedVideo.style.display = 'none';
      previewCtr.style.display    = 'none';
      recMsg.style.display        = 'none';
      confirmBtn.disabled         = true;
      retakeBtn.disabled          = true;
      recordBtn.disabled          = false;
      recordBtn.style.display     = 'inline-block';
      recordBtn.textContent       = '▶️ Start Recording';
      liveVideo.style.display     = 'block';
    
      // 2) clear out the old base64 values
      vidInput.value = '';
      frmInput.value = '';
    
      // 3) restart the camera stream
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
      }
      stream = await navigator.mediaDevices.getUserMedia({ video: true });
      liveVideo.srcObject = stream;
    };

    // prevent submit if no liveness data
    document.getElementById('signup-form').onsubmit = e => {
      if (!vidInput.value || !frmInput.value) {
        e.preventDefault();
        popup.innerHTML = `<ion-icon name="alert-circle-outline"></ion-icon> Please record your liveness first.`;
        popup.style.display = 'block';
        setTimeout(() => popup.style.display = 'none', 5000);
      }
    };
  </script>
</body>
</html>
