<!DOCTYPE html>
<html>
{% load static %}
<head>
    <title>SafetyNet AI Assistant</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background-image: url("{% static 'chatbotbg2.png' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
        }

        .page-wrapper {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding-right: 8%;
        }

        .chat-container {
            width: 420px;
            height: 650px;
            backdrop-filter: blur(14px);
            background: rgba(0, 0, 0, 0.75);
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(45deg, #4285F4, #67B3FF);
            padding: 18px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 12px 15px;
            border-radius: 15px;
            max-width: 75%;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.25s ease-in-out;
            word-wrap: break-word;
        }

        .user {
            align-self: flex-end;
            background: #4285F4;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .bot {
            align-self: flex-start;
            background: #2e2e2e;
            color: #ddd;
            border-bottom-left-radius: 5px;
        }

        .severity {
            font-size: 11px;
            margin-top: 6px;
            opacity: 0.85;
        }

        .severity-high { color: #ff4d4d; }
        .severity-medium { color: #ffa500; }
        .severity-low { color: #00ff99; }

        .input-container {
            display: flex;
            padding: 12px;
            background: rgba(0,0,0,0.9);
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, #4285F4, #67B3FF);
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 10px;
        }

        @media (max-width: 900px) {
            .page-wrapper {
                justify-content: center;
                padding-right: 0;
            }

            .chat-container {
                width: 90%;
                height: 80vh;
            }
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <div class="chat-container">
        <div class="chat-header">
            SafetyNet AI Assistant
        </div>

        <div id="chatBox" class="chat-box"></div>

        <div class="input-container">
            <input type="text" id="messageInput" placeholder="Type your message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>

const inputField = document.getElementById("messageInput");

inputField.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

function sendMessage() {
    const message = inputField.value.trim();
    if (!message) return;

    appendMessage("user", message);
    inputField.value = "";

    fetch("/chatbot/chat/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie("csrftoken")
        },
        body: JSON.stringify({ message: message })
    })
    .then(res => {
        if (!res.ok) {
            throw new Error("Server returned error status");
        }
        return res.json();
    })
    .then(data => {

        if (data.error) {
            appendMessage("bot", data.error);
            return;
        }

        if (!data.response) {
            appendMessage("bot", "Unexpected server response.");
            return;
        }

        appendMessage("bot", data.response, data.severity ?? null);
    })
    .catch(error => {
        console.error("Request failed:", error);
        appendMessage("bot", "Server error. Please try again.");
    });
}

function appendMessage(sender, text, severity=null) {
    const chatBox = document.getElementById("chatBox");

    if (!text) text = "No response received.";

    const msg = document.createElement("div");
    msg.classList.add("message", sender);

    msg.innerHTML = String(text).replace(/\n/g, "<br>");

    if (severity !== null && severity !== undefined) {
        const sev = document.createElement("div");
        sev.classList.add("severity");

        if (severity >= 0.8) sev.classList.add("severity-high");
        else if (severity >= 0.5) sev.classList.add("severity-medium");
        else sev.classList.add("severity-low");

        sev.innerText = "Severity Score: " + severity.toFixed(2);
        msg.appendChild(sev);
    }

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== "") {
        const cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.startsWith(name + "=")) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

</script>

</body>
</html>
